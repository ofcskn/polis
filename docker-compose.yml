services:
  # paper + gate are the "dedicated-server" mode: a fresh, separate Minecraft server that only
  # exists inside this stack. Not started by default — bring them up explicitly with
  # `docker compose --profile dedicated-server up --build`. The default mode below instead has
  # agent-a/agent-b join a world you already have open (e.g. your own singleplayer world, opened
  # to LAN from the Minecraft client itself).
  paper:
    image: itzg/minecraft-server
    restart: unless-stopped
    profiles: ["dedicated-server"]
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.8"
      ONLINE_MODE: "FALSE"
      MEMORY: "2G"
      ENFORCE_SECURE_PROFILE: "false"
    expose:
      - "25565"
    volumes:
      - paper-data:/data

  gate:
    image: ghcr.io/minekube/gate:latest
    restart: unless-stopped
    profiles: ["dedicated-server"]
    depends_on:
      - paper
    environment:
      GATE_CONFIG: /config/gate.yml
    volumes:
      - ./gate/config.yml:/config/gate.yml:ro
    ports:
      - "${MINECRAFT_LAN_PORT:-63325}:25565"
      - "19132:19132/udp"

  world-state:
    build:
      context: .
      dockerfile: packages/world-state/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "41241"
      WORLD_STATE_BASE_URL: "http://world-state:41241/"
      WORLD_STATE_DB_PATH: "/data/world-state.sqlite"
    volumes:
      - world-state-data:/data
    expose:
      - "41241"

  agent-a:
    build:
      context: .
      dockerfile: packages/agent-runtime/Dockerfile
    restart: unless-stopped
    depends_on:
      - world-state
    extra_hosts:
      # host.docker.internal resolves on Docker Desktop (macOS/Windows) automatically; this
      # mapping additionally makes it resolve on Linux. Used both to reach Ollama and, in the
      # default mode, to reach the Minecraft world running on the host's own LAN port.
      - "host.docker.internal:host-gateway"
    environment:
      AGENT_ID: "agent-a"
      AGENT_MINECRAFT_USERNAME: "lenser_a_bot"
      AGENT_PERSONA: "A pragmatic builder who values order."
      MINECRAFT_HOST: "host.docker.internal"
      MINECRAFT_PORT: "${MINECRAFT_LAN_PORT:-63325}"
      WORLD_STATE_URL: "http://world-state:41241/"
      AGENT_BRAIN: "ollama"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.2"

  agent-b:
    build:
      context: .
      dockerfile: packages/agent-runtime/Dockerfile
    restart: unless-stopped
    depends_on:
      - world-state
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AGENT_ID: "agent-b"
      AGENT_MINECRAFT_USERNAME: "lenser_b_bot"
      AGENT_PERSONA: "A curious explorer who values fairness."
      MINECRAFT_HOST: "host.docker.internal"
      MINECRAFT_PORT: "${MINECRAFT_LAN_PORT:-63325}"
      WORLD_STATE_URL: "http://world-state:41241/"
      AGENT_BRAIN: "ollama"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.2"

volumes:
  paper-data:
  world-state-data:
